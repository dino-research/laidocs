name: Build Windows Portable App

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Build Python Sidecar
      run: |
        cd backend
        pyinstaller --name main --onefile --clean --noconfirm --hidden-import docling --hidden-import docling_core --hidden-import pydantic --hidden-import lancedb --hidden-import uvicorn main.py
        mkdir -p ../src-tauri/bin/api
        copy dist\main.exe ..\src-tauri\bin\api\main-x86_64-pc-windows-msvc.exe

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Frontend Dependencies
      run: pnpm install

    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Build Tauri App
      run: pnpm tauri build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LAIDocs-Windows-Portable
        path: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/msi/*.msi
