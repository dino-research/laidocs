name: Build Windows Portable App

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches: ["lairelease" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Build Python Sidecar
      shell: powershell
      run: |
        cd backend
        pyinstaller --name main --onefile --clean --noconfirm `
          --collect-all docling `
          --collect-all docling_core `
          --collect-all deepagents `
          --collect-all crawl4ai `
          --collect-all langchain `
          --collect-all langchain_openai `
          --collect-all langchain_core `
          --collect-all langchain_text_splitters `
          --collect-all langgraph `
          --collect-all langgraph_checkpoint_sqlite `
          --collect-all pydantic `
          --collect-all markitdown `
          --hidden-import uvicorn `
          --hidden-import uvicorn.logging `
          --hidden-import uvicorn.loops `
          --hidden-import uvicorn.loops.auto `
          --hidden-import uvicorn.protocols `
          --hidden-import uvicorn.protocols.http `
          --hidden-import uvicorn.protocols.http.auto `
          --hidden-import uvicorn.protocols.websockets `
          --hidden-import uvicorn.protocols.websockets.auto `
          --hidden-import uvicorn.lifespan `
          --hidden-import uvicorn.lifespan.on `
          main.py
        New-Item -ItemType Directory -Force -Path ..\src-tauri\bin\api | Out-Null
        Copy-Item dist\main.exe ..\src-tauri\bin\api\main-x86_64-pc-windows-msvc.exe

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Frontend Dependencies
      run: pnpm install

    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Build Tauri App
      run: pnpm tauri build

    - name: Prepare Portable Build
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path PortableBuild | Out-Null
        Copy-Item src-tauri\target\release\LAIDocs.exe PortableBuild\
        if (Test-Path src-tauri\target\release\bin) { Copy-Item -Recurse src-tauri\target\release\bin PortableBuild\ }

    - name: Upload Installers
      uses: actions/upload-artifact@v4
      with:
        name: LAIDocs-Installers
        path: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/msi/*.msi

    - name: Upload Portable Zip
      uses: actions/upload-artifact@v4
      with:
        name: LAIDocs-Portable-Windows
        path: PortableBuild/

    - name: Upload Sidecar Debug
      uses: actions/upload-artifact@v4
      with:
        name: LAIDocs-Sidecar-Debug
        path: src-tauri/bin/api/main-x86_64-pc-windows-msvc.exe
